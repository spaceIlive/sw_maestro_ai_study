services:
  backend:
    build:
      context: ./backend
    container_name: contextbridge-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    command: .venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: contextbridge-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ENABLE_MSW: "false"
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
